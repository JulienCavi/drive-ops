<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatmaps Picking – Vue aérienne Pro</title>
  <link rel="stylesheet" href="css/heatmaps.css" />
</head>
<body>
  <div class="app-container">
    <!-- HEADER COMPACT -->
    <header class="top-bar">
      <div class="top-bar-left">
        <h1 class="app-title">Heatmaps Picking</h1>
        <p class="app-subtitle">Visualisation par zone, type & période</p>
      </div>
      <div class="top-bar-right">
        <div class="zone-selector">
          <label class="input-label">ZONE</label>
          <select id="zone-select" class="select-input"></select>
        </div>
      </div>
    </header>

    <!-- STATUS BAR -->
    <div id="status-bar" class="status-bar">Chargement en cours...</div>

    <!-- LAYOUT PRINCIPAL : PANNEAU LATÉRAL + VUE PLAN -->
    <div class="main-container">
      
      <!-- PANNEAU LATÉRAL GAUCHE : CONTRÔLES & STATS -->
      <aside class="sidebar">
        
        <!-- CARD : FILTRES -->
        <section class="sidebar-card">
          <h2 class="card-title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M7 12h10M10 18h4"/>
            </svg>
            Filtres
          </h2>
          
          <div class="filter-section">
            <label class="filter-label">TYPES</label>
            <div id="type-filters" class="chip-group"></div>
          </div>

          <div class="filter-section">
            <label class="filter-label">PÉRIODE</label>
            <div class="date-inputs">
              <div class="date-field">
                <label class="date-label">Du</label>
                <input type="date" id="date-from" class="date-input" />
              </div>
              <div class="date-field">
                <label class="date-label">Au</label>
                <input type="date" id="date-to" class="date-input" />
              </div>
            </div>
            <button id="max-period-btn" class="action-btn">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
              </svg>
              Max période
            </button>
          </div>
        </section>

        <!-- CARD : STATISTIQUES -->
        <section class="sidebar-card">
          <h2 class="card-title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Statistiques
          </h2>
          <div id="stats-content" class="stats-grid">
            <div class="stat-item">
              <div class="stat-label">Total picks</div>
              <div id="stat-total" class="stat-value">—</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Minimum</div>
              <div id="stat-min" class="stat-value">—</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Maximum</div>
              <div id="stat-max" class="stat-value">—</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Médiane</div>
              <div id="stat-median" class="stat-value">—</div>
            </div>
          </div>
        </section>

        <!-- CARD : LÉGENDE -->
        <section class="sidebar-card">
          <h2 class="card-title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              ircle cx="12" cy="12"2" r="10"/><path d="M12 16v-4M12 8h.01"/>
            </svg>
            Légende
          </h2>
          <div class="legend-container">
            <div class="legend-gradient"></div>
            <div class="legend-labels">
              <span class="legend-text">Froid</span>
              <span class="legend-text">Chaud</span>
            </div>
          </div>
        </section>

      </aside>

      <!-- VUE PLAN PRINCIPALE -->
      <main class="plan-container">
        <div class="plan-header">
          <h2 class="plan-title">Plan de la zone</h2>
          <div class="plan-controls">
            <label class="zoom-label">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                ircle cx="11" cy="11" r="8"8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              Zoom
            </label>
            <input 
              type="range" 
              id="zoom-slider" 
              class="zoom-slider" 
              min="0.3" 
              max="1.5" 
              step="0.05" 
              value="1" 
            />
            <span id="zoom-value" class="zoom-value">100%</span>
          </div>
        </div>
        
        <div class="plan-viewport" id="plan-viewport">
          <div class="plan-wrapper" id="plan-wrapper">
            <table id="plan-table"></table>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- Tooltip dynamique -->
  <div id="tooltip" class="tooltip"></div>

  <script src="js/heatmaps.js"></script>
</body>
</html>
